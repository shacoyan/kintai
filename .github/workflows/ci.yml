name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint (react-hooks rules-of-hooks)
        run: npm run lint

      - name: Build (tsc + vite build)
        run: npm run build

      - name: Run tests (vitest)
        run: npx vitest run

  e2e-a11y:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers + system deps (chromium)
        run: npx playwright install --with-deps chromium

      - name: Run E2E a11y scan
        run: npm run e2e:a11y
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          E2E_USER_EMAIL: ${{ secrets.E2E_USER_EMAIL }}
          E2E_USER_PASSWORD: ${{ secrets.E2E_USER_PASSWORD }}
          E2E_TENANT_NAME: ${{ secrets.E2E_TENANT_NAME }}
          E2E_TENANT_ID: ${{ secrets.E2E_TENANT_ID }}
          E2E_STORE_HONTEN_ID: ${{ secrets.E2E_STORE_HONTEN_ID }}
          E2E_STORE_BUNTEN_ID: ${{ secrets.E2E_STORE_BUNTEN_ID }}

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
